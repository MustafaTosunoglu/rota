spring:
  application:
    name: rota-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rota}
    username: ${DB_USERNAME:rota}
    password: ${DB_PASSWORD:rota_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Phase 0: no domain entities or migrations yet, so there is nothing to
      # validate. `none` lets the app boot cleanly (the Modulith event_publication
      # table is created by schema-initialization below). Phase 1 switches this
      # back to `validate` once Flyway migrations own the full schema.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    # No migrations exist yet (Phase 0). Flyway will report "no migrations found".

  modulith:
    events:
      jdbc:
        schema-initialization:
          # Auto-create the Spring Modulith `event_publication` table at startup.
          # Phase 0 convenience; a Flyway migration may own this table in later phases.
          enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  port: 8080
