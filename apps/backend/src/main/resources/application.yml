spring:
  application:
    name: rota-backend

  # Virtual threads: the Try It proxy (Phase 5) issues blocking outbound HTTP on them.
  threads:
    virtual:
      enabled: true

  # Loads gitignored dev overrides (e.g. the encryption master key) when present.
  # `optional:` => silently skipped in CI / prod where the file does not exist.
  config:
    import: "optional:classpath:application-local.yml"

  datasource:
    # RUNTIME connects as the unprivileged rota_app role so Row-Level Security is
    # enforced for every application query (see common.tenant.TenantAwareDataSource).
    # Flyway uses a SEPARATE privileged connection below to run DDL / create roles.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rota}
    username: ${DB_USERNAME:rota_app}
    password: ${ROTA_APP_DB_PASSWORD:rota_app_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only VALIDATES that the JPA entity mappings
      # match the migrated tables at startup (never creates/alters). Phase 1D onward.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    # Flyway runs as a PRIVILEGED role (creates rota_app/rota_admin, schemas, RLS).
    # The runtime datasource above stays unprivileged (rota_app). Separate creds here.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rota}
    user: ${DB_ADMIN_USERNAME:rota}
    password: ${DB_ADMIN_PASSWORD:rota_dev_password}
    locations: classpath:db/migration
    # The dev DB may already contain the Modulith `event_publication` table (created
    # before any migrations existed); baseline-on-migrate lets Flyway adopt the current
    # state as its baseline instead of refusing to run on a non-empty schema.
    baseline-on-migrate: true
    placeholders:
      # LOCAL DEV database role passwords — NOT production secrets. Same posture as the
      # already-committed docker-compose credentials. Real secrets (encryption KEK, JWT
      # signing keys) live in gitignored application-local.yml (added in Phase 1C/1D).
      # Override via env vars in any shared/non-local environment.
      rotaAppPassword: ${ROTA_APP_DB_PASSWORD:rota_app_dev_password}
      rotaAdminPassword: ${ROTA_ADMIN_DB_PASSWORD:rota_admin_dev_password}

  modulith:
    events:
      jdbc:
        schema-initialization:
          # OFF: the runtime role rota_app has no CREATE privilege on schema public
          # (PG15+), so it cannot self-create this table. Flyway (privileged) owns it
          # via V005 instead. This also removes the Phase 0 shutdown warning.
          enabled: false

  data:
    redis:
      # Used for distributed rate limiting (Bucket4j) and the access-token blacklist.
      # Lettuce connects lazily — an unreachable Redis does not fail startup, only the
      # Redis-backed features (which are gated by the rota.* flags below).
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mail:
    # Dev: maildev SMTP catcher (infra/docker-compose.yml — web UI at http://localhost:1080).
    # When host is BLANK (e.g. tests), no JavaMailSender is created and EmailConfig falls back
    # to a logging no-op sender. Prod swaps in Resend (Phase 1F).
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  port: 8080

rota:
  rate-limit:
    # Per-IP throttle on the unauthenticated /api/v1/auth/* endpoints (plan §8.5: 10/min).
    # Disabled by default in tests; requires Redis when enabled.
    enabled: ${ROTA_RATE_LIMIT_ENABLED:true}
    capacity: 10
    refill-period: 1m
  token-blacklist:
    # On logout, the access token's jti is stored in Redis until it would have expired,
    # so the (short-lived) access token is rejected immediately rather than living out its TTL.
    enabled: ${ROTA_TOKEN_BLACKLIST_ENABLED:true}
  proxy:
    # Try It server proxy (plan §13.1). SSRF block ON by default; disable only for local dev
    # to allow targeting localhost APIs. Daily quota needs Redis (disabled in tests).
    block-private-networks: ${ROTA_PROXY_BLOCK_PRIVATE:true}
    daily-free-limit: ${ROTA_PROXY_DAILY_LIMIT:100}
    daily-limit-enabled: ${ROTA_PROXY_DAILY_LIMIT_ENABLED:true}
  email:
    # Provider: smtp (dev → maildev, needs spring.mail.host) or resend (prod HTTP API).
    provider: ${ROTA_EMAIL_PROVIDER:smtp}
    # From address + frontend base URL used to build verification / reset links.
    from: ${ROTA_EMAIL_FROM:no-reply@rota.local}
    app-base-url: ${ROTA_APP_BASE_URL:http://localhost:5173}
    # Resend API key — secret; NO committed default (application-local.yml / secret manager).
    resend-api-key: ${ROTA_RESEND_API_KEY:}
  encryption:
    # 256-bit AES master key (KEK), base64. NO committed default — supplied by
    # application-local.yml in dev (gitignored) and a secret manager in prod.
    master-key: ${ROTA_MASTER_KEY:}
  jwt:
    # RS256 PEM keypair. If BLANK, an ephemeral keypair is generated at startup (dev/test
    # convenience; tokens won't survive a restart). PROD MUST provide stable keys.
    private-key: ${ROTA_JWT_PRIVATE_KEY:}
    public-key: ${ROTA_JWT_PUBLIC_KEY:}
    issuer: rota
    access-token-ttl: 15m
    refresh-token-ttl: 30d
