# Test-only encryption master key (KEK). Deterministic so @SpringBootTest contexts boot in
# CI without the gitignored application-local.yml. Throwaway 32-byte base64 value; not a
# real secret. Does not shadow the main application.yml (different filename).
rota.encryption.master-key=nA/JLgqQZ4abSrjRsOJ9sMYDIgRBW6ggw1XCg+mrQow=

# Redis-backed auth hardening is OFF by default in tests so suites need no Redis and aren't
# throttled. RateLimitAndBlacklistTest re-enables both and supplies a Testcontainers Redis.
rota.rate-limit.enabled=false
rota.token-blacklist.enabled=false

# Try It daily quota is OFF by default in tests (needs Redis); the dedicated quota test
# re-enables it with a Testcontainers Redis. SSRF block stays ON (default) so the SSRF test
# is realistic; the happy-path proxy test disables it per-test to reach a local stub server.
rota.proxy.daily-limit-enabled=false
