server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: client-side routes (/login, /app/dashboard, ...) must fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the backend container — same-origin from the browser's view,
    # so no CORS is needed (mirrors the Vite dev proxy). X-Forwarded-For carries the real
    # client IP for the backend's per-IP rate limiter.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
