# Rota — local development infrastructure stack
# Usage: ./scripts/dev-up.sh  (or: docker compose -f infra/docker-compose.yml up -d)
#
# Services: PostgreSQL 17, Redis 7, Kafka 3.8 (KRaft), MailDev
# NOTE: This stack runs infrastructure only. The backend (Spring Boot) runs
# locally via ./gradlew bootRun in early phases — not containerized yet.

name: rota-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: rota-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rota
      POSTGRES_PASSWORD: rota_dev_password
      POSTGRES_DB: rota
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rota -d rota"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: rota-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    # Official Apache Kafka image (KRaft mode, no ZooKeeper).
    # NOTE: bitnami/kafka was deprecated/removed from Docker Hub in 2025,
    # so we use the official apache/kafka image. Version 3.9.x satisfies the
    # plan's "Kafka 3.8+" requirement.
    image: apache/kafka:3.9.1
    container_name: rota-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  maildev:
    image: maildev/maildev:latest
    container_name: rota-maildev
    restart: unless-stopped
    ports:
      - "1080:1080"   # Web UI
      - "1025:1025"   # SMTP
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:1080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  kafka-data:
